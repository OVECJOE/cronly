<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#0e0f0c"/>

  <!-- Clock ring -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#e8a830" stroke-width="1.5"/>

  <!-- Cardinal tick marks -->
  <line x1="16" y1="5.5" x2="16" y2="7.5"   stroke="#e8a830" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26.5" y1="16" x2="24.5" y2="16" stroke="#e8a830" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="26.5" x2="16" y2="24.5" stroke="#e8a830" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5.5" y1="16" x2="7.5" y2="16"   stroke="#e8a830" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Hour hand  pointing to ~10 o'clock -->
  <line x1="16" y1="16" x2="10.5" y2="9.5"
        stroke="#e8a830" stroke-width="2" stroke-linecap="round"/>

  <!-- Minute hand  pointing to ~12 (straight up) -->
  <line x1="16" y1="16" x2="16" y2="7"
        stroke="#f0c040" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Centre dot -->
  <circle cx="16" cy="16" r="1.75" fill="#e8a830"/>
</svg>
